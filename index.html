═════════════════════════════════════

DISTANCE BETWEEN CURVES:

    formulas:[

      "C''(c) > 0 confirms minimum;  C''(c) < 0 confirms maximum",

D(1/2) = 1/4 - 1/2 + 1 = 3/4  ← smallest!
D(2)   = 4 - 2 + 1 = 3

Minimum vertical distance = 3/4  at  x = 1/2`

  {

    concept:"When a limit gives 0/0 or ∞/∞, differentiate top and bottom SEPARATELY — not quotient rule! — and try again.",
    visual:`WHEN TO USE L'HÔPITAL'S:

Plug in → real number  →  you're done already!

THE RULE:
If lim f(x)/g(x) = 0/0 or ∞/∞,  THEN:

lim f(x)/g(x) = lim f'(x)/g'(x)

⚠️  Differentiate TOP and BOTTOM separately!

OTHER INDETERMINATE FORMS (convert first):

      "For 1^∞: y=f^g → ln y = g·ln(f) → find lim → answer = e^(limit)",
      "For 0·∞: rewrite as f/(1/g) to get 0/0 or ∞/∞ form",

const quiz = [
  { q:"In related rates, WHEN should you substitute numerical values for quantities that change with time?", choices:["Before differentiating — set it up first","After differentiating both sides with respect to t","At the very beginning","Only for constants"], correct:1, ex:"Always differentiate FIRST, then substitute. Plugging in too early kills the rate terms — the #1 exam mistake." },
  { q:"The linearization L(x) of f at a equals:", choices:["f(a) · f'(a)","f(a) + f'(a)(x − a)","f'(a)(x − a)","f(a) + f'(x)(x − a)"], correct:1, ex:"L(x) = f(a) + f'(a)(x-a). It's the tangent line equation at (a, f(a))." },
  { q:"Which statement about extrema is TRUE?", choices:["Both local and absolute max can occur at endpoints","Local max CAN occur at an endpoint","Absolute max CAN occur at an endpoint, local max CANNOT","Neither can occur at an endpoint"], correct:2, ex:"Local extrema require an open interval around c — so endpoints are excluded. Absolute extrema CAN be at endpoints." },
  { q:"The Extreme Value Theorem guarantees absolute max/min when f is:", choices:["Continuous on an open interval (a,b)","Differentiable on a closed interval [a,b]","Continuous on a closed bounded interval [a,b]","Any function on any closed interval"], correct:2, ex:"EVT needs CONTINUOUS on a CLOSED bounded interval. Both conditions are essential." },
  { q:"Does f(x) = tan x satisfy Rolle's Theorem on [0, π]?", choices:["Yes — it's differentiable everywhere","Yes — f(0) = f(π) = 0","No — tan x is discontinuous at x = π/2 ∈ [0,π]","No — f(0) ≠ f(π)"], correct:2, ex:"tan x has a vertical asymptote at x=π/2, which is inside [0,π]. Rolle's requires continuity on the closed interval." },
  { q:"f''(x) > 0 on an interval tells you:", choices:["f is increasing","f is decreasing","f is concave up ∪ — smiley face, holds water","f is concave down ∩ — frowny face, spills water"], correct:2, ex:"f''>0 means f' is increasing → curve bends upward → concave UP ∪. Positive = Mr. Smiley." },
  { q:"The Second Derivative Test is INCONCLUSIVE when:", choices:["f'(c)=0 and f''(c)>0","f'(c)=0 and f''(c)<0","f'(c)≠0","f'(c)=0 and f''(c)=0"], correct:3, ex:"When f''(c)=0 the test tells you nothing. Switch to the First Derivative Test (sign change of f')." },
  { q:"lim(x→∞) (3x² + x) / (5x² − 2) = ?", choices:["0","∞","3/5","1/5"], correct:2, ex:"Same degree top and bottom → ratio of leading coefficients = 3/5. Fastest shortcut: compare x² terms only." },
  { q:"lim(x→−∞) √(x²−25) / (2x−6) = ?", choices:["1/2","−1/2","1/4","∞"], correct:1, ex:"Key trap: √(x²)=|x|=−x when x→−∞. So √(x²)/(2x) → (−x)/(2x) = −1/2. Don't forget the negative!" },
  { q:"When does L'Hôpital's Rule directly apply?", choices:["When the limit equals zero","When the limit gives 0/0 or ∞/∞","Always, for any fraction","When the limit gives 0·∞"], correct:1, ex:"L'H applies ONLY to 0/0 or ∞/∞. Forms like 0·∞ need algebra first. Always check the form!" },
];

// STATE
let state = { view:"home", section:null, tab:"concept", quizAnswers:{}, score:0, answered:0 };

function render() {
  const app = document.getElementById("app");
  if (state.view === "home") app.innerHTML = renderHome();
  else if (state.view === "section") app.innerHTML = renderSection();
  else if (state.view === "quiz") app.innerHTML = renderQuiz();
  bindEvents();
}

function renderHome() {
  const cards = sections.map(s => `
    <button class="card" data-section="${s.id}" style="border-top:4px solid ${s.color}">
      <div class="emoji">${s.emoji}</div>
      <div class="section-title" style="color:${s.color}">${s.title}</div>
      <p>${s.concept}</p>
      <span class="arrow" style="color:${s.color}">Visual + Formulas + Tips + Example →</span>
    </button>`).join("");

  const rows = [
    {topic:"Related Rates", tip:"Plug in numbers AFTER differentiating — never before.", color:"#6366f1"},
    {topic:"Local vs Absolute", tip:"Local extrema CANNOT be at endpoints. Absolute extrema CAN.", color:"#ec4899"},
    {topic:"EVT", tip:"Needs continuous + CLOSED bounded interval. Open or unbounded → No EVT.", color:"#ec4899"},
    {topic:"Rolle's / MVT", tip:"Check ALL hypotheses first. tan(x) on [0,π] fails at x=π/2.", color:"#f59e0b"},
    {topic:"Inflection Points", tip:"f'' must CHANGE SIGN. Just equalling zero is NOT enough.", color:"#10b981"},
    {topic:"2nd Deriv Test", tip:"Inconclusive when f''(c)=0 — fall back to the 1st Derivative Test.", color:"#10b981"},
    {topic:"L'Hôpital's Rule", tip:"Only for 0/0 or ∞/∞. Check the form FIRST before applying.", color:"#14b8a6"},
    {topic:"√ and x→−∞", tip:"√(x²) = |x| = −x when x < 0. The answer often flips sign!", color:"#0ea5e9"},
  ].map(r=>`<div class="gotcha-row"><span class="gotcha-tag" style="background:${r.color}">${r.topic}</span><span class="gotcha-tip">${r.tip}</span></div>`).join("");

  return `
    <div class="home-header">
      <div class="sub">Math 3A / 203S</div>
      <h1>Chapter 4 Study Guide</h1>
      <p>Tap any section to study visually. Quiz yourself when ready.</p>
      <button class="quiz-btn" id="go-quiz">📝 Take Practice Quiz — 10 Questions</button>
    </div>
    <div class="grid">${cards}</div>
    <div class="gotchas">
      <h3>⚡ Quick-Reference: The 8 Biggest Exam Traps</h3>
      ${rows}
    </div>`;
}

function renderSection() {
  const s = sections.find(x => x.id === state.section);
  const tabs = [
    {id:"concept",label:"📊 Visual"},
    {id:"formulas",label:"📐 Formulas"},
    {id:"tricks",label:"💡 Tips"},
    {id:"example",label:"✏️ Example"},
  ];
  const tabBtns = tabs.map(t=>`
    <button class="tab-btn ${state.tab===t.id?"active":""}" data-tab="${t.id}"
      style="${state.tab===t.id?`background:${s.color};`:""}">
      ${t.label}
    </button>`).join("");

  let content = "";
  if (state.tab === "concept") {
    content = `<div class="code-block"><pre>${escHtml(s.visual)}</pre></div>`;

} else if (state.tab === “formulas”) {
content = `<div class="formula-list">${s.formulas.map(f=>`
<div class="formula-item" style="border-left:4px solid ${s.color}">${escHtml(f)}</div>`).join("")}</div>`;
} else if (state.tab === “tricks”) {
content = `<div class="tips-list">${s.tricks.map(t=>`
<div class="tip-item">💡 ${escHtml(t)}</div>`).join("")}</div>`;
} else if (state.tab === “example”) {
content = `<div class="code-block green"><pre>${escHtml(s.example)}</pre></div>`;
}

return ` <button class="back-btn" id="go-home">← All Sections</button> <div class="section-hero" style="background:${s.color}"> <div class="emoji">${s.emoji}</div> <h2>${s.title}</h2> <p>${s.concept}</p> </div> <div class="tabs">${tabBtns}</div> ${content}`;
}

function renderQuiz() {
const pct = state.answered > 0 ? Math.round(state.score/state.answered*100) : 0;
let resultHtml = “”;
if (state.answered === quiz.length) {
const sc = state.score;
const bg = sc>=9?”#dcfce7”:sc>=7?”#fef9c3”:”#fee2e2”;
const border = sc>=9?”#16a34a”:sc>=7?”#ca8a04”:”#dc2626”;
const icon = sc>=9?“🎉”:sc>=7?“📚”:“💪”;
const msg = sc>=9?“You’re test ready!”:sc>=7?“Almost there — review what you missed.”:“Keep studying — you’ve got this!”;
resultHtml = `<div class="result-box" style="background:${bg};border:2px solid ${border}"> <div class="big">${icon}</div> <div class="score">${sc}/10 — ${pct}%</div> <div class="msg">${msg}</div> </div>`;
}

const qHtml = quiz.map((q,i) => {
const ans = state.quizAnswers[i];
const choiceHtml = q.choices.map((c,ci) => {
let cls = “choice-btn”;
if (ans !== undefined) {
if (ci === q.correct) cls += “ correct”;
else if (ci === ans && ci !== q.correct) cls += “ wrong”;
}
return `<button class="choice-btn ${ans!==undefined?(ci===q.correct?"correct":ci===ans?"wrong":""):""}" data-qi="${i}" data-ci="${ci}" ${ans!==undefined?"disabled":""}> <strong>${["A","B","C","D"][ci]}.</strong> ${escHtml(c)} </button>`;
}).join(””);
const exHtml = ans !== undefined ? `<div class="explanation ${ans===q.correct?"good":"bad"}"> ${ans===q.correct?"✅":"💡"} <strong>${ans===q.correct?"Correct! ":"Not quite. "}</strong>${escHtml(q.ex)} </div>` : “”;
return `<div class="q-card"> <div class="q-num">Question ${i+1} of ${quiz.length}</div> <div class="q-text">${escHtml(q.q)}</div> ${choiceHtml}${exHtml} </div>`;
}).join(””);

return ` <div class="quiz-header"> <button class="back-btn" id="go-home" style="margin-bottom:0">← Back</button> <h2>📝 Practice Quiz</h2> <div class="score-badge">${state.score}/${state.answered} correct</div> </div> ${resultHtml}${qHtml}`;
}

function escHtml(str) {
return str.replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”);
}

function bindEvents() {
document.querySelectorAll(”.card[data-section]”).forEach(el=>{
el.addEventListener(“click”,()=>{ state.view=“section”; state.section=el.dataset.section; state.tab=“concept”; render(); });
});
document.querySelectorAll(”.tab-btn[data-tab]”).forEach(el=>{
el.addEventListener(“click”,()=>{ state.tab=el.dataset.tab; render(); });
});
document.querySelectorAll(”.choice-btn[data-qi]”).forEach(el=>{
el.addEventListener(“click”,()=>{
const qi=+el.dataset.qi, ci=+el.dataset.ci;
if(state.quizAnswers[qi]!==undefined) return;
state.quizAnswers[qi]=ci;
state.answered++;
if(ci===quiz[qi].correct) state.score++;
render();
});
});
const goHome = document.getElementById(“go-home”);
if(goHome) goHome.addEventListener(“click”,()=>{ state.view=“home”; state.section=null; render(); });
const goQuiz = document.getElementById(“go-quiz”);
if(goQuiz) goQuiz.addEventListener(“click”,()=>{ state.view=“quiz”; state.quizAnswers={}; state.score=0; state.answered=0; render(); });
}

render();
</script>

</body>
</html>
